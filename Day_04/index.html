<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login & Register App</title>
    <style>
        body { font-family: Arial, sans-serif; display: flex; justify-content: center; gap: 40px; align-items: center; height: 100vh; background-color: #f4f4f9; margin: 0; flex-wrap: wrap; }
        .box { background: white; padding: 25px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); width: 300px; }
        h2 { text-align: center; margin-top: 0; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; }
        .btn-register { background: #28a745; }
        .btn-register:hover { background: #218838; }
        .btn-login { background: #007bff; }
        .btn-login:hover { background: #0056b3; }
        .message { margin-top: 15px; text-align: center; font-size: 14px; min-height: 20px; }
    </style>
</head>
<body>

<!-- Register Form -->
<div class="box">
    <h2>Register New User</h2>
    <form id="registerForm">
        <input type="text" id="regUsername" placeholder="Enter new Username" required>
        <input type="password" id="regPassword" placeholder="Enter new Password" required>
        <button type="submit" class="btn-register">Register</button>
    </form>
    <div id="regMessage" class="message"></div>
</div>

<!-- Login Form -->
<div class="box">
    <h2>Login</h2>
    <form id="loginForm">
        <input type="text" id="logUsername" placeholder="Username" required>
        <input type="password" id="logPassword" placeholder="Password" required>
        <button type="submit" class="btn-login">Login</button>
    </form>
    <div id="logMessage" class="message"></div>
</div>

<script>
    // --- Register Function ---
    document.getElementById('registerForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const username = document.getElementById('regUsername').value;
        const password = document.getElementById('regPassword').value;
        const messageDiv = document.getElementById('regMessage');

        try {
            const response = await fetch('http://localhost:3000/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });
            const data = await response.json();

            if (response.status === 201) {
                messageDiv.style.color = 'green';
                messageDiv.innerText = 'Registration Successful! You can login now.';
                document.getElementById('registerForm').reset(); // Form එක clear කිරීම
            } else {
                messageDiv.style.color = 'red';
                messageDiv.innerText = data.message || 'Registration failed';
            }
        } catch (err) {
            messageDiv.style.color = 'red';
            messageDiv.innerText = 'Server error.';
        }
    });

    // --- Login Function ---
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const username = document.getElementById('logUsername').value;
        const password = document.getElementById('logPassword').value;
        const messageDiv = document.getElementById('logMessage');

        try {
            const response = await fetch('http://localhost:3000/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });
            const data = await response.json();

            if (response.ok) {
                messageDiv.style.color = 'green';
                messageDiv.innerText = 'Login Successful! Token received.';
                localStorage.setItem('token', data.token); // Token එක save කිරීම
            } else {
                messageDiv.style.color = 'red';
                messageDiv.innerText = data.message || 'Login failed';
            }
        } catch (err) {
            messageDiv.style.color = 'red';
            messageDiv.innerText = 'Server error.';
        }
    });
</script>

</body>
</html>
